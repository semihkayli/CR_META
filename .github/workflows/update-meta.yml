name: Daily Meta Decks Sync

on:
  schedule:
    # Run 8 times daily (every 3 hours) with timezone-aware region rotation
    # Each run scans regions whose players are most active at that UTC hour
    # 00:00 UTC (TR 03:00) — South America peak + Europe late
    # 03:00 UTC (TR 06:00) — South America + North America
    # 06:00 UTC (TR 09:00) — North America late + Global
    # 09:00 UTC (TR 12:00) — East Asia mid-peak + Oceania
    # 12:00 UTC (TR 15:00) — East Asia + South Asia + Oceania
    # 15:00 UTC (TR 18:00) — South Asia + Middle East
    # 18:00 UTC (TR 21:00) — Middle East + Europe peak
    # 21:00 UTC (TR 00:00) — Europe peak + Global
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
  workflow_dispatch:
    inputs:
      scan_all:
        description: 'Scan all regions instead of rotation'
        type: boolean
        default: false

jobs:
  sync-decks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Compile Meta Decks
        env:
          CLASH_ROYALE_API_KEY: ${{ secrets.CLASH_ROYALE_API_KEY }}
          SCAN_ALL_REGIONS: ${{ inputs.scan_all || 'false' }}
        run: node scripts/update-meta.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Backup the freshly generated data files before touching git
          mkdir -p /tmp/generated_data /tmp/generated_cards
          cp -r src/data/* /tmp/generated_data/
          cp -r public/images/cards/* /tmp/generated_cards/ 2>/dev/null || true
          
          # Fetch and hard-reset to latest remote HEAD (avoids all merge conflicts)
          git fetch origin main
          git reset --hard origin/main
          
          # Restore the generated files on top of the clean remote state
          cp -r /tmp/generated_data/* src/data/
          mkdir -p public/images/cards
          cp -r /tmp/generated_cards/* public/images/cards/ 2>/dev/null || true
          
          # Stage and commit
          git add src/data/ public/images/cards/
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update meta data and cached images [skip ci]"
            git push
          fi
