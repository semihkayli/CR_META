name: Daily Meta Decks Sync

on:
  schedule:
    # Run everyday at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual triggering from GitHub actions tab

jobs:
  sync-decks:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # Extended for 1000 player scan (~8-15 min)
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compile Meta Decks
        env:
          CLASH_ROYALE_API_KEY: ${{ secrets.CLASH_ROYALE_API_KEY }}
        run: node scripts/update-meta.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/ public/images/cards/
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update meta data and cached images [skip ci]"
            git push
          fi
